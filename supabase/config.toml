project_id = "hkqrgomafbohittsdnea"

[api]
schemas = ["public", "graphql_public", "inbox", "research"]
extra_search_path = ["public", "extensions", "inbox", "research"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = []

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[functions.chat]
verify_jwt = false

[functions.execute-query]
verify_jwt = false

[functions.create-user]
verify_jwt = false

[functions.delete-user]
verify_jwt = false
